height: 168
width: 168

encoder_path: "models/DINOv2/dinov2_vits14_reg4_pretrain.pth"
patch: 14

dataset:
  use_mask: False
  num_scene: 6
  sample_rate: 1

train:
  dataset_path: "data/train/DJIAction4/"
  result_path: "result/train/"
  batch_size: 4
  gpu_id: 0
  epoch: 700
  log_interval: 5
  save_interval: 100
  loss_lambda: 0.1
  use_adaptive_weight: False
  use_checkpoint: False
  checkpoint_path: "result/train/current.pth"

eval:
  model_path: "models/IOPEN/latest_bkp.pth"
  output_dir: "result/eval/"
  mode: "batch"
  coco_path: "data/eval/instances_default.json"
  coco_frame_dir: "data/eval/frame/"
  keyframe_propagation:
    enabled: True
    interval: 2
    match_iou_thr: 0.1
    match_center_thr: 2.0
  postprocess:
    ema_heatmap:
      enabled: True
      alpha: 0.7
      track_iou_thr: 0.3
    box_fit:
      enabled: False
      dims_xyz: auto
      inner_ignore_quantile: 0.25
      enclose_scale: 1.1
      result_smooth:
        enabled: True
        alpha: 0.7