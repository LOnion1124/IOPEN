height: 168
width: 168

encoder_path: "models/DINOv2/dinov2_vits14_reg4_pretrain.pth"
patch: 14

dataset:
  use_mask: False
  num_scene: 6
  sample_rate: 1

train:
  dataset_path: "data/train/DJIAction4/"
  result_path: "result/train/"
  batch_size: 4
  gpu_id: 0
  epoch: 700
  log_interval: 5
  save_interval: 100
  loss_lambda: 0.1
  use_adaptive_weight: False
  use_checkpoint: False
  checkpoint_path: "result/train/current.pth"

eval:
  model_path: "models/IOPEN/latest.pth"
  output_dir: "result/eval/"
  mode: "coco"
  coco_path: "data/eval/instances_default.json"
  coco_frame_dir: "data/eval/frame/"