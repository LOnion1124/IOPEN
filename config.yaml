height: 168
width: 168

encoder_path: "models/DINOv2/dinov2_vits14_reg4_pretrain.pth"
patch: 14

dataset:
  use_mask: False
  num_scene: 6
  scene_split:
    train: [0, 1, 2, 3]
    validate: [4]
  sample_rate: 1
  crop_aug:
    enabled: True
    scale_min: 0.9
    scale_max: 1.2
    shift_ratio: 0.1

train:
  dataset_path: "data/train/DJIAction4/"
  result_path: "result/train/"
  batch_size: 4
  val_batch_size: 4
  validate_enabled: True
  validate_interval: 1
  save_best_checkpoint: True
  best_checkpoint_path: "result/train/best.pth"
  gpu_id: 0
  epoch: 5
  log_interval: 50
  save_interval: 100
  loss_lambda: 1.0
  loss_temperature: 0.1
  loss_alpha: 10.0
  use_adaptive_weight: True
  coarse_only_epochs: 5
  early_stopping_enabled: True
  early_stopping_patience: 10
  early_stopping_min_delta: 0.0001
  use_checkpoint: False
  checkpoint_path: "result/train/current.pth"

eval:
  model_path: "models/IOPEN/latest.pth"
  output_dir: "data/eval/result"
  mode: "batch"
  coco_path: "data/eval/instances_default.json"
  coco_frame_dir: "data/eval/frame/"
  keyframe_propagation:
    enabled: True
    interval: 2
    match_iou_thr: 0.1
    match_center_thr: 2.0
  postprocess:
    ema_heatmap:
      enabled: True
      alpha: 0.7
      track_iou_thr: 0.3
    box_fit:
      enabled: False
      dims_xyz: auto
      inner_ignore_quantile: 0.25
      enclose_scale: 1.1
      result_smooth:
        enabled: True
        alpha: 0.7